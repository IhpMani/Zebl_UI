<div class="import-modal-overlay" (click)="cancel.emit()" role="presentation">
  <div class="import-modal import-modal--wide" role="dialog" aria-labelledby="rate-class-import-title" (click)="$event.stopPropagation()">
    <header class="import-modal__header">
      <h2 id="rate-class-import-title" class="import-modal__title">{{ dialogTitle }}</h2>
      <button type="button" class="import-modal__close" (click)="cancel.emit()" aria-label="Close">&times;</button>
    </header>

    <div class="import-modal__body">
      <p class="import-modal__hint" *ngIf="importFileLabel">
        Choose the procedure code file and rate class settings, then click <strong>OK</strong> to import.
      </p>

      <div class="import-modal__row">
        <label class="import-modal__row-label">Procedure file</label>
        <div class="import-modal__file-row">
          <input
            type="text"
            class="import-modal__file-display"
            [value]="model.procedureCodeFile || ''"
            placeholder="No file selected"
            readonly
            (click)="browseProcedureFile.emit()"
          />
          <button type="button" class="import-modal__btn-browse" (click)="browseProcedureFile.emit()">Browse…</button>
        </div>
      </div>

      <div class="import-modal__row">
        <label class="import-modal__row-label">Rate class</label>
        <select [(ngModel)]="model.rateClass">
          <option [ngValue]="null">— Select —</option>
          <option *ngFor="let rc of rateClassOptions" [ngValue]="rc">{{ rc }}</option>
        </select>
      </div>

      <div class="import-modal__row">
        <label class="import-modal__row-label">Billing physician</label>
        <select [(ngModel)]="model.billingPhysicianId">
          <option [ngValue]="null">— Select —</option>
          <option *ngFor="let phy of physicianOptions" [ngValue]="phy.value">{{ phy.label }}</option>
        </select>
      </div>

      <div class="import-modal__row">
        <label class="import-modal__row-label">Payer</label>
        <select [(ngModel)]="model.payerId">
          <option [ngValue]="null">— Select —</option>
          <option *ngFor="let p of payerOptions" [ngValue]="p.value">{{ p.label }}</option>
        </select>
      </div>
    </div>

    <footer class="import-modal__footer">
      <button type="button" class="import-modal__btn import-modal__btn--secondary" (click)="cancel.emit()">Cancel</button>
      <button type="button" class="import-modal__btn import-modal__btn--primary" (click)="submit()">OK</button>
    </footer>
  </div>
</div>
